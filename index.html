<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Digital Suanpan</title>
    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            margin: 0;
            padding: 2dvh 2vw;
            touch-action: manipulation;
            /* allow scrolling on small/landscape viewports */
            overflow: auto;
            -webkit-overflow-scrolling: touch;
            /* prefer flexible minimum height so content can grow and scroll */
            min-height: 100dvh;
            box-sizing: border-box;
        }

        h1 {
            color: #111;
            font-size: clamp(1.2rem, 3vw, 2rem);
            margin: 0 0 1dvh 0;
        }

        .value-display {
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: bold;
            color: #111;
            margin-bottom: 2dvh;
            font-family: monospace;
        }

        #rotate-message {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #ffffff;
            z-index: 100;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            text-align: center;
            padding: 20px;
            color: #2c1e16;
            font-weight: bold;
        }

        @media screen and (orientation: portrait) {
            #rotate-message {
                display: flex;
            }
            .main-content {
                display: none !important;
            }
        }

        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 1000px;
            /* allow content to expand and enable scrolling when needed */
            height: auto;
            justify-content: center;
        }

        .suanpan-container {
            width: 100%;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
        }

        .frame {
            display: flex;
            background-color: #fcfcfc;
            padding: 1vw;
            border: clamp(6px, 1.5vw, 12px) solid #2c1e16;
            position: relative;
            border-radius: 4px;
            width: 100%;
            height: 45dvh;
            min-height: 200px;
        }

        .beam {
            position: absolute;
            top: 30%;
            left: 0;
            right: 0;
            height: 4%;
            background-color: #2c1e16;
            z-index: 10;
        }

        .rod {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            margin: 0 0.3vw;
        }

        .rod::before {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            width: 4px;
            background-color: #888;
            z-index: 1;
            box-shadow: inset 1px 0 2px rgba(0,0,0,0.5);
        }

        .heaven, .earth {
            display: flex;
            flex-direction: column;
            width: 100%;
            z-index: 2;
            align-items: center;
        }

        .heaven {
            height: 50%;
            justify-content: flex-start;
            padding-top: 1dvh;
            gap: 0.5dvh;
        }

        .earth {
            height: 65%;
            margin-top: auto;
            justify-content: flex-end;
            padding-bottom: 1dvh;
            gap: 0.5dvh;
        }

        .bead {
            width: 85%;
            max-width: 40px;
            height: 14%;
            min-height: 10px;
            border-radius: 50px;
            background: radial-gradient(circle at 30% 30%, #5c3a21, #241107);
            cursor: pointer;
            transition: transform 0.15s ease-in-out;
            box-shadow: 0 3px 4px rgba(0,0,0,0.6);
        }

        .bead:hover {
            filter: brightness(1.2);
        }

        .heaven .bead.active {
            transform: translateY(8dvh);
        }

        .earth .bead.active {
            transform: translateY(-8dvh);
        }

        .controls {
            display: flex;
            justify-content: center;
            margin-top: 3dvh;
        }

        button {
            padding: 1.5dvh 4vw;
            font-size: clamp(1rem, 2vw, 1.2rem);
            cursor: pointer;
            border: none;
            background-color: #2c1e16;
            color: white;
            border-radius: 5px;
            font-family: inherit;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #1a110d;
        }
    </style>
</head>
<body>

    <div id="rotate-message">Please rotate your phone horizontally to use the digital board</div>

    <div class="main-content">
        <h1>The Chinese Suanpan</h1>
        <div class="value-display" id="value-display">0</div>

        <div class="suanpan-container">
            <div class="frame" id="frame">
                <div class="beam"></div>
            </div>
        </div>

        <div class="controls">
            <button type="button" onclick="resetSuanpan()">Reset Board</button>
        </div>
    </div>

    <script>
        const numColumns = 13;
        const frame = document.getElementById('frame');
        const display = document.getElementById('value-display');

        function initSuanpan() {
            for (let col = 0; col < numColumns; col++) {
                const rod = document.createElement('div');
                rod.className = 'rod';

                const heaven = document.createElement('div');
                heaven.className = 'heaven';
                for (let i = 0; i < 2; i++) {
                    const bead = document.createElement('div');
                    bead.className = 'bead';
                    bead.dataset.type = 'heaven';
                    bead.dataset.idx = i;
                    bead.addEventListener('click', handleBeadClick);
                    heaven.appendChild(bead);
                }

                const earth = document.createElement('div');
                earth.className = 'earth';
                for (let i = 0; i < 5; i++) {
                    const bead = document.createElement('div');
                    bead.className = 'bead';
                    bead.dataset.type = 'earth';
                    bead.dataset.idx = i;
                    bead.addEventListener('click', handleBeadClick);
                    earth.appendChild(bead);
                }

                rod.appendChild(heaven);
                rod.appendChild(earth);
                frame.appendChild(rod);
            }
        }

        function handleBeadClick(e) {
            const bead = e.target;
            const type = bead.dataset.type;
            const idx = parseInt(bead.dataset.idx);
            const parent = bead.parentElement;
            const allBeads = Array.from(parent.children);
            const isActive = bead.classList.contains('active');

            if (type === 'heaven') {
                if (!isActive) {
                    allBeads.forEach((b, i) => {
                        if (i >= idx) b.classList.add('active');
                    });
                } else {
                    allBeads.forEach((b, i) => {
                        if (i <= idx) b.classList.remove('active');
                    });
                }
            } else {
                if (!isActive) {
                    allBeads.forEach((b, i) => {
                        if (i <= idx) b.classList.add('active');
                    });
                } else {
                    allBeads.forEach((b, i) => {
                        if (i >= idx) b.classList.remove('active');
                    });
                }
            }
            calculateTotal();
        }

        function calculateTotal() {
            const rods = document.querySelectorAll('.rod');
            let total = 0;

            rods.forEach((rod, colIndex) => {
                const power = rods.length - 1 - colIndex;
                let colValue = 0;

                const heavenBeads = rod.querySelectorAll('.heaven .bead.active');
                colValue += heavenBeads.length * 5;

                const earthBeads = rod.querySelectorAll('.earth .bead.active');
                colValue += earthBeads.length * 1;

                total += colValue * Math.pow(10, power);
            });

            display.innerText = total.toLocaleString();
        }

        function resetSuanpan() {
            const allBeads = document.querySelectorAll('.bead');
            allBeads.forEach(bead => bead.classList.remove('active'));
            calculateTotal();
        }

        initSuanpan();
    </script>
</body>
</html>
